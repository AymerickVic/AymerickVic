<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <clipPath id="clip"><circle cx="130" cy="130" r="88"/></clipPath>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <circle cx="130" cy="130" r="100" fill="url(#ring)" opacity="0.25" filter="url(#blur)">
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="98;106;98" dur="3s" repeatCount="indefinite"/>
  </circle>

  <image href="data:image/png;base64," x="42" y="42" width="176" height="176" clip-path="url(#clip)"/>

  <circle cx="130" cy="130" r="100" fill="none" stroke="url(#ring)" stroke-width="5" stroke-linecap="round" stroke-dasharray="150 59.4">
    <animateTransform attributeName="transform" type="rotate" from="0 130 130" to="360 130 130" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="130" cy="130" r="112" fill="none" stroke="url(#ring)" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 22" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="360 130 130" to="0 130 130" dur="12s" repeatCount="indefinite"/>
  </circle>

  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 130 130" to="360 130 130" dur="6s" repeatCount="indefinite"/>
    <circle cx="130" cy="30" r="6" fill="#06b6d4"/>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="180 130 130" to="540 130 130" dur="6s" repeatCount="indefinite"/>
    <circle cx="130" cy="30" r="4" fill="#7c3aed"/>
  </g>
</svg>
